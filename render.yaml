services:
  - type: web
    name: memo-app
    env: node
    plan: free
    buildCommand: npm install && cd client && npm install && npm run build
    startCommand: node server.js
    healthCheckPath: /api/notebooks
    envVars:
      - key: NODE_ENV
        value: production
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
