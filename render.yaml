services:
  - type: web
    name: memo-app
    env: node
    plan: free
    buildCommand: npm install && cd client && npm install --include=dev && npm run build
    startCommand: node server.js
    healthCheckPath: /api/notebooks
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: exit-interview
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node exit-interview-server.js
    healthCheckPath: /exit-interview-dashboard

